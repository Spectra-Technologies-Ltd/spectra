services:
  - type: web
    name: spectra-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: spectra-db
          property: connectionString
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: spectra-db
    plan: free
